<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title data-i18n="extensionName">__MSG_extensionName__</title>
    <style>
        :root {
            --bg: #0f1724;
            --panel: #0b1220;
            --panel-strong: #111827;
            --line: rgba(255, 255, 255, 0.07);
            --ink: #e6eef6;
            --muted: #9aa4b2;
            --accent: #3b82f6;
            --accent-2: #93c5fd;
            --warning: #ff964a;
            --warning-strong: #d97706;
            --danger: #ef4444;
            --danger-strong: #dc2626;
            --glass: rgba(255, 255, 255, 0.03);
            --shadow: 0 6px 14px rgba(59, 130, 246, 0.12);
            color-scheme: dark;
        }

        * {
            box-sizing: border-box;
        }

        body {
            width: 400px;
            margin: 0;
            padding: 14px 0 14px 14px;
            color: var(--ink);
            font-family: Inter, "Segoe UI", Roboto, Arial, "Noto Sans TC", sans-serif;
            background:
                radial-gradient(circle at 8% 0%, rgba(59, 130, 246, 0.16), transparent 15rem),
                radial-gradient(circle at 96% 12%, rgba(255, 150, 74, 0.1), transparent 13rem),
                linear-gradient(180deg, rgba(11,17,29,1) 0%, rgba(14,20,33,1) 100%);
            -webkit-font-smoothing: antialiased;
            scrollbar-color: rgba(255, 255, 255, 0.3) transparent;
            overflow-x: hidden;
            overflow-y: auto;
        }

        body,
        .popup-shell,
        .card {
            min-width: 0;
        }

        button,
        input,
        select {
            font: inherit;
        }

        button {
            border: none;
            border-radius: 8px;
            padding: 8px 12px;
            color: #fff;
            background: linear-gradient(180deg, var(--accent), #2563eb);
            cursor: pointer;
            font-weight: 600;
            box-shadow: var(--shadow);
            transition: transform 120ms ease, filter 120ms ease, opacity 120ms ease;
        }

        button:hover:not(:disabled) {
            transform: translateY(-1px);
            filter: brightness(1.06);
        }

        button:disabled {
            cursor: not-allowed;
            opacity: 0.42;
        }

        button.primary {
            color: #fff;
            background: linear-gradient(180deg, var(--accent), #2563eb);
        }

        button.warn {
            color: #fff;
            background: linear-gradient(180deg, var(--danger), var(--danger-strong));
        }

        button.third {
            color: #fff;
            background: linear-gradient(180deg, var(--warning), var(--warning-strong));
        }

        input,
        select {
            width: 100%;
            border: 1px solid var(--line);
            border-radius: 8px;
            padding: 8px 10px;
            color: var(--ink);
            background: rgba(11, 18, 32, 0.72);
            outline: none;
        }

        input:focus,
        select:focus {
            border-color: rgba(59, 130, 246, 0.72);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
        }

        .popup-shell {
            display: grid;
            gap: 10px;
            width: 100%;
            overflow-y: visible;
            overflow-x: hidden;
            padding-right: 14px;
        }

        .card {
            width: 100%;
            padding: 0;
            background: transparent;
        }

        .top-card {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            border: 1px solid var(--line);
            border-radius: 10px;
            padding: 10px;
            background: rgba(255, 255, 255, 0.026);
        }

        .title-block {
            display: grid;
            gap: 3px;
            flex: 1 1 auto;
            min-width: 0;
        }

        .title-status-row {
            display: flex;
            align-items: center;
            gap: 8px;
            min-width: 0;
        }

        .eyebrow {
            margin: 0 0 4px;
            color: var(--accent-2);
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }

        h1,
        h2 {
            margin: 0;
            letter-spacing: -0.04em;
        }

        h1 {
            font-size: 17px;
        }

        h2 {
            font-size: 15px;
        }

        .muted {
            color: var(--muted);
            font-size: 12px;
        }

        .switch {
            position: relative;
            display: inline-block;
            width: 48px;
            height: 26px;
            flex: 0 0 auto;
            line-height: 0;
        }

        .switch input {
            width: 0;
            height: 0;
            opacity: 0;
        }

        .slider {
            position: absolute;
            inset: 0;
            box-sizing: border-box;
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 999px;
            background: rgba(148, 163, 184, 0.24);
            cursor: pointer;
            box-shadow: inset 0 0 0 1px rgba(0, 0, 0, 0.18);
            transition: background 160ms ease, border-color 160ms ease, box-shadow 160ms ease;
        }

        .slider:before {
            content: "";
            position: absolute;
            width: 18px;
            height: 18px;
            left: 4px;
            top: 50%;
            border-radius: 50%;
            background: #fff;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.32);
            transform: translateY(-50%);
            transition: transform 160ms ease, background 160ms ease;
        }

        input:checked + .slider {
            border-color: rgba(59, 130, 246, 0.8);
            background: linear-gradient(180deg, var(--accent), #2563eb);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.12);
        }

        input:checked + .slider:before {
            transform: translate(22px, -50%);
        }

        #toggleStatus {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-width: 44px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 999px;
            padding: 3px 8px;
            color: var(--muted);
            background: rgba(255, 255, 255, 0.035);
            font-size: 11px;
            font-weight: 700;
        }

        #toggleStatus.is-on {
            border-color: rgba(59, 130, 246, 0.34);
            color: var(--accent-2);
            background: rgba(59, 130, 246, 0.1);
        }

        #toggleStatus.is-off {
            border-color: rgba(148, 163, 184, 0.12);
            color: var(--muted);
            background: rgba(148, 163, 184, 0.06);
        }

        .notice-card {
            display: none;
            gap: 10px;
            border: 1px solid rgba(255, 150, 74, 0.28);
            border-radius: 10px;
            padding: 10px;
            border-color: rgba(255, 150, 74, 0.28);
            background: rgba(255, 150, 74, 0.08);
        }

        .notice-card.visible {
            display: grid;
        }

        .notice-title {
            color: var(--warning);
            font-size: 13px;
            font-weight: 700;
        }

        .notice-intro {
            color: var(--ink);
            font-size: 12px;
            line-height: 1.45;
        }

        .notice-list {
            display: grid;
            gap: 4px;
            margin: 0;
            padding-left: 17px;
            color: var(--muted);
            font-size: 12px;
            line-height: 1.45;
        }

        .notice-actions {
            display: flex;
            justify-content: flex-end;
        }

        .song-detect-panel {
            display: grid;
            gap: 10px;
            border: 1px solid var(--line);
            border-radius: 10px;
            padding: 10px;
            background: var(--glass);
        }

        .detect-header {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            gap: 12px;
        }

        .detector-pill {
            flex: 0 0 auto;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            border: 1px solid rgba(59, 130, 246, 0.28);
            border-radius: 999px;
            padding: 5px 8px;
            color: var(--accent-2);
            background: rgba(59, 130, 246, 0.08);
            font-size: 11px;
            font-weight: 700;
        }

        .detect-controls {
            display: grid;
            grid-template-columns: minmax(0, 1fr) minmax(0, 1fr) 112px;
            gap: 8px;
            align-items: end;
            min-width: 0;
        }

        .mini-field {
            display: grid;
            gap: 5px;
            min-width: 0;
            color: var(--muted);
            font-size: 11px;
            font-weight: 600;
        }

        .mini-field input {
            padding: 8px 9px;
            font-size: 12px;
            font-variant-numeric: tabular-nums;
        }

        .live-method-field {
            display: grid;
            gap: 6px;
            min-width: 0;
        }

        .live-method-label {
            color: var(--muted);
            font-size: 11px;
            font-weight: 700;
        }

        .live-method-toggle {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 6px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 9px;
            padding: 4px;
            background: rgba(11, 18, 32, 0.5);
        }

        .live-method-btn,
        .live-method-btn:hover:not(:disabled) {
            min-width: 0;
            border-radius: 7px;
            padding: 7px 8px;
            color: var(--muted);
            background: transparent;
            box-shadow: none;
            font-size: 11px;
            font-weight: 700;
            transform: none;
            filter: none;
        }

        .live-method-btn.active {
            color: #fff;
            background: linear-gradient(180deg, var(--accent), #2563eb);
            box-shadow: 0 6px 14px rgba(59, 130, 246, 0.14);
        }

        #detectStatusText,
        #detectHint {
            color: var(--muted);
            font-size: 12px;
            line-height: 1.45;
            word-break: break-word;
        }

        .status-row {
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 8px;
            padding: 10px;
            background: rgba(255, 255, 255, 0.035);
        }

        .button-container,
        .controls {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 8px;
        }

        .action-grid {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 8px;
        }

        .action-section,
        .list-section {
            display: grid;
            gap: 8px;
        }

        .action-grid button:first-child {
            grid-column: 1 / -1;
        }

        .search-row {
            display: grid;
            grid-template-columns: minmax(0, 1fr);
            gap: 8px;
            position: relative;
        }

        .search-control-row {
            display: grid;
            grid-template-columns: minmax(0, 1fr) 88px;
            gap: 8px;
            min-width: 0;
        }

        .custom-select {
            position: relative;
            width: 100%;
            min-width: 0;
        }

        .custom-select-input {
            display: none;
        }

        .custom-select-button {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            width: 100%;
            border: 1px solid var(--line);
            border-radius: 8px;
            padding: 8px 10px;
            color: var(--ink);
            background: rgba(11, 18, 32, 0.72);
            box-shadow: none;
            text-align: left;
        }

        .custom-select-button:hover,
        .custom-select-button:hover:not(:disabled),
        .custom-select.open .custom-select-button {
            border-color: rgba(59, 130, 246, 0.48);
            background: rgba(59, 130, 246, 0.08);
            transform: none;
            filter: none;
        }

        .custom-select-label {
            min-width: 0;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .custom-select-arrow {
            display: inline-grid;
            place-items: center;
            width: 18px;
            height: 18px;
            flex: 0 0 18px;
            color: var(--accent-2);
            transition: transform 140ms ease;
        }

        .custom-select.open .custom-select-arrow {
            transform: rotate(180deg);
        }

        .custom-select.compact .custom-select-button {
            padding: 8px 9px;
            font-size: 12px;
        }

        .custom-select.compact .custom-select-menu {
            left: auto;
            min-width: 116px;
        }

        .custom-select-menu {
            position: absolute;
            top: calc(100% + 5px);
            left: 0;
            right: 0;
            z-index: 30;
            display: none;
            overflow: hidden;
            border: 1px solid rgba(59, 130, 246, 0.28);
            border-radius: 10px;
            padding: 5px;
            background: rgba(10, 17, 30, 0.98);
            box-shadow: 0 14px 32px rgba(0, 0, 0, 0.34);
        }

        .custom-select.open .custom-select-menu {
            display: grid;
            gap: 3px;
        }

        .custom-select-option {
            display: flex;
            align-items: center;
            justify-content: space-between;
            width: 100%;
            border: 0;
            border-radius: 7px;
            padding: 8px 9px;
            color: var(--muted);
            background: transparent;
            box-shadow: none;
            font-size: 12px;
            text-align: left;
        }

        .custom-select-option:hover,
        .custom-select-option:hover:not(:disabled),
        .custom-select-option[aria-selected="true"] {
            color: var(--ink);
            background: rgba(59, 130, 246, 0.12);
            transform: none;
            filter: none;
        }

        .custom-select-option[aria-selected="true"]::after {
            content: "✓";
            color: var(--accent-2);
            font-weight: 800;
        }

        .playlist-container {
            width: 100%;
            overflow-y: visible;
            overflow-x: hidden;
            padding-right: 0;
        }

        .playlist-item {
            display: flex;
            flex-direction: column;
            gap: 8px;
            width: 100%;
            border: 1px solid var(--line);
            border-radius: 10px;
            margin: 8px 0;
            padding: 12px;
            background: linear-gradient(180deg, rgba(255, 255, 255, 0.035), rgba(255, 255, 255, 0.014));
            min-width: 0;
            transition: border-color 120ms ease, background 120ms ease;
        }

        .playlist-item:hover {
            border-color: rgba(59, 130, 246, 0.22);
            background: rgba(59, 130, 246, 0.055);
        }

        .playlist-top {
            display: flex;
            width: 100%;
            align-items: center;
            justify-content: space-between;
            min-width: 0;
        }

        .playlist-main {
            flex: 1 1 auto;
            min-width: 0;
        }

        .playlist-title {
            display: block;
            overflow: visible;
            margin: 0 0 4px;
            font-size: 14px;
            font-weight: 600;
            line-height: 1.35;
            overflow-wrap: anywhere;
            white-space: normal;
        }

        .playlist-info {
            display: block;
            margin: 0;
            padding: 0;
            color: var(--muted);
            background: transparent;
            font-size: 12px;
            font-weight: 400;
        }

        .playlist-expand {
            user-select: none;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 8px;
            width: 100%;
            cursor: pointer;
            border-right: 0;
            border-bottom: 0;
            border-left: 0;
            border-top: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 0;
            padding: 7px 2px 0;
            color: var(--muted);
            background: transparent;
            font-size: 12px;
            font-weight: 650;
            line-height: 1.2;
            text-align: right;
            box-shadow: none;
        }

        .playlist-expand:hover {
            color: var(--accent-2);
            background: transparent;
            transform: none;
            filter: none;
        }

        .playlist-expand:hover:not(:disabled) {
            transform: none;
            filter: none;
        }

        .playlist-expand-text {
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .playlist-expand-icon {
            display: inline-grid;
            place-items: center;
            width: 20px;
            height: 20px;
            flex: 0 0 20px;
            border-radius: 999px;
            color: var(--accent-2);
            background: rgba(59, 130, 246, 0.08);
            font-size: 11px;
            line-height: 1;
            transition: transform 140ms ease, background 140ms ease;
        }

        .playlist-expand[aria-expanded="true"] .playlist-expand-icon {
            transform: rotate(180deg);
            background: rgba(59, 130, 246, 0.14);
        }

        .playlist-details {
            margin-top: 0;
            padding-top: 8px;
            border-top: 1px solid rgba(255, 255, 255, 0.06);
        }

        .playlist-details ul {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .timeline-entry {
            display: grid;
            grid-template-columns: 132px minmax(0, 1fr);
            gap: 8px;
            align-items: start;
            border-radius: 6px;
            padding: 6px 8px;
            color: var(--muted);
            font-size: 11.5px;
        }

        .timeline-entry:nth-child(odd) {
            background: rgba(255, 255, 255, 0.025);
        }

        .timeline-entry:hover {
            background: rgba(59, 130, 246, 0.07);
        }

        .timeline-start,
        .timeline-end,
        .timeline-time-range {
            color: var(--accent-2);
            font-family: "Cascadia Mono", Consolas, "Liberation Mono", monospace;
            font-size: 10.5px;
            font-variant-numeric: tabular-nums;
            letter-spacing: -0.04em;
            line-height: 1.45;
            white-space: nowrap;
        }

        .timeline-title {
            min-width: 0;
            overflow: visible;
            color: var(--ink);
            line-height: 1.35;
            overflow-wrap: anywhere;
            white-space: normal;
        }

        #importInput {
            display: none;
        }

        .toast-container {
            position: fixed;
            right: 14px;
            bottom: 14px;
            z-index: 9999;
            display: grid;
            gap: 8px;
            pointer-events: none;
        }

        .toast {
            width: 340px;
            border: 1px solid rgba(59, 130, 246, 0.3);
            border-radius: 6px;
            padding: 10px 12px;
            color: var(--ink);
            background: rgba(0, 0, 0, 0.8);
            box-shadow: 0 2px 6px rgba(0,0,0,0.3);
            font-size: 12px;
            line-height: 1.45;
            opacity: 0;
            transform: translateY(8px);
            transition: opacity 0.2s ease, transform 0.2s ease;
            pointer-events: auto;
        }

        .toast.show {
            opacity: 1;
            transform: translateY(0);
        }

    </style>
</head>
<body>
    <main class="popup-shell">
        <section class="card top-card">
            <div class="title-block">
                <p class="eyebrow">Timeline Jumper</p>
                <div class="title-status-row">
                    <h1>YouTube Timeline</h1>
                    <span id="toggleStatus" data-i18n="toggle_off">__MSG_toggle_off__</span>
                </div>
            </div>
            <label class="switch">
                <input type="checkbox" id="extensionToggle">
                <span class="slider"></span>
            </label>
        </section>

        <section id="featureNotice" class="card notice-card" aria-live="polite">
            <div id="featureNoticeTitle" class="notice-title"></div>
            <div id="featureNoticeIntro" class="notice-intro"></div>
            <ul id="featureNoticeList" class="notice-list"></ul>
            <div class="notice-actions">
                <button id="dismissFeatureNoticeBtn" type="button" data-ui-key="feature_notice_dismiss">知道了</button>
            </div>
        </section>

        <section class="card song-detect-panel">
            <div class="detect-header">
                <div>
                    <p class="eyebrow" data-ui-key="detect_eyebrow">Auto Detection</p>
                    <h2 data-ui-key="detect_title">歌曲片段偵測</h2>
                </div>
                <span class="detector-pill">FireRed AED</span>
            </div>

            <div class="detect-controls">
                <button id="authorizeStartBtn" class="primary" type="button" data-ui-key="start_detect">Start Detect</button>
                <button id="stopDetectBtn" class="warn" type="button" disabled data-ui-key="stop_detect">Stop Detect</button>
                <label class="mini-field" for="minSegmentSecInput">
                    <span data-ui-key="min_segment_seconds">最短片段秒數</span>
                    <input id="minSegmentSecInput" type="number" min="15" max="600" step="1" placeholder="90">
                </label>
            </div>

            <div class="live-method-field">
                <span class="live-method-label" data-ui-key="live_method_label">Live 方法</span>
                <div class="live-method-toggle" role="group" aria-label="Live analysis method">
                    <button class="live-method-btn active" type="button" data-live-method="aed-cache-60s" aria-pressed="true" data-ui-key="live_method_aed_cache_60s">60 秒 AED cache</button>
                    <button class="live-method-btn" type="button" data-live-method="pcm-rollover-30min" aria-pressed="false" data-ui-key="live_method_pcm_rollover">30 分鐘 PCM cache</button>
                </div>
            </div>

            <div class="status-row">
                <div id="detectStatusText"></div>
                <div id="detectHint"></div>
            </div>
        </section>

        <section class="card action-section">
            <div class="action-grid">
                <button id="openWorkbenchBtn" class="primary" type="button" data-ui-key="playlist_studio">Playlist Studio</button>
                <button id="exportBtn" type="button" data-i18n="export_all">__MSG_export_all__</button>
                <button id="importBtn" class="third" type="button" data-i18n="import_playlists">__MSG_import_playlists__</button>
            </div>
            <input type="file" id="importInput" accept=".json">
        </section>

        <section class="card list-section">
            <div class="search-row">
                <div class="search-control-row">
                    <input id="searchInput" type="search" data-i18n-placeholder="search_placeholder" placeholder="__MSG_search_placeholder__">
                    <div id="searchScopeDropdown" class="custom-select compact">
                        <input id="searchScopeSelect" class="custom-select-input" type="hidden" value="all">
                        <button id="searchScopeButton" class="custom-select-button" type="button" aria-haspopup="listbox" aria-expanded="false">
                            <span id="searchScopeLabel" class="custom-select-label"></span>
                            <span class="custom-select-arrow" aria-hidden="true">▾</span>
                        </button>
                        <div id="searchScopeMenu" class="custom-select-menu" role="listbox" aria-label="Search scope">
                            <button class="custom-select-option" type="button" role="option" data-value="all" data-ui-key="search_scope_all">全部</button>
                            <button class="custom-select-option" type="button" role="option" data-value="title" data-ui-key="search_scope_title">標題</button>
                        </div>
                    </div>
                </div>
                <div id="sortDropdown" class="custom-select">
                    <input id="sortSelect" class="custom-select-input" type="hidden" value="lastModified_desc">
                    <button id="sortSelectButton" class="custom-select-button" type="button" aria-haspopup="listbox" aria-expanded="false">
                        <span id="sortSelectLabel" class="custom-select-label"></span>
                        <span class="custom-select-arrow" aria-hidden="true">▾</span>
                    </button>
                    <div id="sortSelectMenu" class="custom-select-menu" role="listbox" aria-label="Sort playlists">
                        <button class="custom-select-option" type="button" role="option" data-value="lastModified_desc" data-i18n="sort_lastModified_desc">__MSG_sort_lastModified_desc__</button>
